name: LeetCode Daily Auto-Fetch

on:
  schedule:
    # 每天北京时间 00:00 运行 (UTC 16:00)
    - cron: '0 16 * * *'
  workflow_dispatch: # 允许在网页上手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 获取完整历史，便于后续的 rebase

      - name: 2. Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. Install dependencies
        run: |
          pip install requests playwright
          # 必须安装 Chromium 浏览器，否则 Playwright 截图和生成 PDF 会失败
          playwright install chromium

      - name: 4. Run Crawler Script
        run: |
          python leetcode_daily.py

      - name: 5. Commit and Push to Repository
        run: |
          git config --global user.name "LeetCodeBot"
          git config --global user.email "bot@github.com"
          git add .
          
          # 关键防御机制：先拉取远程最新内容并 rebase 合并，防止覆盖你本地手动提交的笔记
          git pull origin main --rebase
          
          # 检查是否有文件变更，如果有则提交并推送
          if ! git diff --staged --quiet; then
            git commit -m "Auto: Update daily problem $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes to commit."
          fi