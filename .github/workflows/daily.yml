name: LeetCode Daily Auto-Fetch

on:
  schedule:
    - cron: '0 16 * * *' # 北京时间 00:00
  workflow_dispatch: 

# 显式声明权限，双重保险修复 Exit Code 128
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4 # 升级到 v4
        with:
          fetch-depth: 0 

      - name: 2. Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.11' 

      - name: 3. Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium

      - name: 4. Run Crawler Script
        run: |
          python leetcode_daily.py

      - name: 5. Commit and Push
        run: |
          git config --global user.name "LeetCodeBot"
          git config --global user.email "bot@github.com"
          
          git add .
          # 检查是否有变更，防止空提交报错
          if ! git diff --staged --quiet; then
            # 先拉取远程，防止 Action 运行时你本地也有推送导致冲突
            git pull origin main --rebase
            git commit -m "Auto: Update daily problem $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes detected."
          fi